    <script>

        firebase.auth().onAuthStateChanged(function (user) {

            if (!user) {

                alert("Vui lòng đăng nhập!");
                window.location.href = "index.html";
                return;
            }

            firebase.firestore()
                .collection("users")
                .doc(user.email.toLowerCase())
                .get()
                .then(function (doc) {

                    if (!doc.exists) {

                        alert("Không tìm thấy dữ liệu user!");
                        window.location.href = "index.html";
                        return;
                    }

                    const userData = doc.data();

                    // ADMIN được vào toàn bộ
                    if (userData.role === "admin") {
                        return;
                    }

                    // CHECK QUYỀN MODULE
                    const permissions = userData.permissions || {};

                    if (!permissions.addton) {

                        alert("Bạn không có quyền truy cập module này!");

                        window.location.href = "index.html";
                    }

                });

        });

    </script>

    <script>

        let rawData = [];
        let filteredData = [];
        let paused = false;
        let stopped = false;
        let lastUploadUrl = "";
        let lastUploadLabel = "";


        const fileInput = document.getElementById("fileInput");
        const uploadAll =
            document.getElementById(
                "uploadAll"
            );
        const upload1 = document.getElementById("upload1");
        const upload2 = document.getElementById("upload2");
        const exportExcel = document.getElementById("exportExcel");
        const resumeBtn =
            document.getElementById(
                "resumeBtn"
            );

        const pauseBtn =
            document.getElementById(
                "pauseBtn"
            );

        const stopBtn =
            document.getElementById(
                "stopBtn"
            );

        pauseBtn.addEventListener("click", () => {

            paused = !paused;

            pauseBtn.innerText =
                paused
                    ? "▶️ Tiếp tục"
                    : "⏸️ Tạm dừng";

            log(
                paused
                    ? "⏸️ Đã tạm dừng"
                    : "▶️ Tiếp tục upload"
            );
        });

        stopBtn.addEventListener("click", () => {

            stopped = true;
            paused = false;

            log("⛔ Đã dừng upload");
        });

        resumeBtn.addEventListener(
            "click",
            async () => {

                if (!lastUploadUrl) {
                    alert("Chưa có upload trước đó");
                    return;
                }

                stopped = false;
                paused = false;

                updateProgress(0);

                log("🔄 Chạy lại upload");

                await uploadGoogle(
                    lastUploadUrl,
                    lastUploadLabel
                );
            }
        );

        const logBox = document.getElementById("log");

        const totalRowsEl = document.getElementById("totalRows");
        const filteredRowsEl = document.getElementById("filteredRows");
        const chunkCountEl = document.getElementById("chunkCount");
        const percentEl = document.getElementById("percent");

        const bar = document.getElementById("bar");

        function log(message) {

            const now = new Date().toLocaleTimeString();

            logBox.innerHTML += `
        <div style="margin:0; padding:0;">
            <span style="color:#94a3b8">
                [${now}]
            </span>
            ${message}
        </div>
    `;

            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateProgress(pct) {

            const val =
                Math.round(pct);

            bar.style.width =
                val + "%";

            bar.innerText =
                val + "%";

            percentEl.innerText =
                val + "%";
        }

        function sleep(ms) {
            return new Promise(r => setTimeout(r, ms));
        }

        fileInput.addEventListener(
            "change",
            async (e) => {

                const file =
                    e.target.files[0];

                if (!file) return;

                log("📂 Đang đọc file...");

                upload1.disabled = true;
                upload2.disabled = true;
                exportExcel.disabled = true;

                await sleep(50);

                const reader =
                    new FileReader();

                reader.onload =
                    async (evt) => {

                        try {

                            const data =
                                new Uint8Array(
                                    evt.target.result
                                );

                            const workbook =
                                XLSX.read(data, {
                                    type: "array"
                                });

                            const sheetName =
                                workbook.SheetNames[0];

                            const sheet =
                                workbook.Sheets[sheetName];

                            rawData =
                                XLSX.utils.sheet_to_json(
                                    sheet,
                                    {
                                        header: 1,
                                        defval: ""
                                    }
                                );

                            totalRowsEl.innerText =
                                rawData.length
                                    .toLocaleString("vi-VN");

                            log(
                                `✅ Đọc xong ${rawData.length.toLocaleString("vi-VN")} dòng`
                            );

                            await xuLyDuLieu();

                            upload1.disabled = false;
                            uploadAll.disabled = false;

                            if (
                                document
                                    .getElementById("sheet2")
                                    .value.trim()
                            ) {
                                upload2.disabled = false;
                            }

                            exportExcel.disabled = false;

                        } catch (err) {

                            console.error(err);

                            log(
                                "❌ Lỗi đọc file: "
                                + err.message
                            );
                        }
                    };

                reader.readAsArrayBuffer(file);

            });

        async function xuLyDuLieu() {

            log("⚙️ Bắt đầu lọc KC...");

            await sleep(50);

            const header =
                rawData[0]
                    .map(x =>
                        String(x)
                            .trim()
                            .toLowerCase()
                    );

            let colE =
                header.indexOf(
                    "location_name"
                );

            if (colE === -1) {
                colE = 4;
            }

            filteredData = [];

            const len =
                rawData.length;

            for (let i = 1; i < len; i++) {

                const row =
                    rawData[i];

                if (
                    !row ||
                    row.length <= colE
                ) {
                    continue;
                }
                if (stopped) {
                    log("⛔ Upload đã dừng");
                    break;
                }

                while (paused) {
                    await sleep(500);
                }


                const val =
                    String(
                        row[colE] || ""
                    )
                        .trim()
                        .toUpperCase();

                if (
                    val.includes("KC")
                ) {

                    let sliced =
                        row.slice(1, 18);

                    while (
                        sliced.length < 17
                    ) {
                        sliced.push("");
                    }

                    filteredData.push(
                        sliced
                    );
                }

                if (i % 5000 === 0) {

                    log(
                        `🔄 Scan ${i.toLocaleString("vi-VN")} dòng`
                    );

                    await sleep(0);
                }
            }

            log(
                `✅ Lọc xong ${filteredData.length.toLocaleString("vi-VN")} dòng chứa KC`
            );

            filteredData.sort(
                (a, b) =>
                    String(a[3] || "")
                        .localeCompare(
                            String(b[3] || ""),
                            "vi",
                            {
                                sensitivity: "base"
                            }
                        )
            );

            filteredRowsEl.innerText =
                filteredData.length
                    .toLocaleString("vi-VN");

            const chunkSize =
                parseInt(
                    document
                        .getElementById("chunkSize")
                        .value
                ) || 5000;

            chunkCountEl.innerText =
                Math.ceil(
                    filteredData.length /
                    chunkSize
                )
                    .toLocaleString("vi-VN");

            log(
                "✅ Sort A→Z cột E hoàn tất"
            );
        }

        exportExcel
            .addEventListener(
                "click",
                () => {

                    if (
                        !filteredData.length
                    ) {
                        alert(
                            "Không có dữ liệu"
                        );
                        return;
                    }

                    log(
                        "📥 Đang xuất Excel..."
                    );

                    const ws =
                        XLSX.utils
                            .aoa_to_sheet(
                                filteredData
                            );

                    const wb =
                        XLSX.utils
                            .book_new();

                    XLSX.utils
                        .book_append_sheet(
                            wb,
                            ws,
                            "TON_KC"
                        );

                    XLSX.writeFile(
                        wb,
                        `TON_LOC_KC_${Date.now()
                        }.xlsx`
                    );

                    log(
                        "✅ Xuất Excel hoàn tất"
                    );
                });
        async function retryFetch(url, options, retry) {

            let lastError = "";

            for (let i = 0; i < retry; i++) {

                try {

                    console.log("POST URL:", url);
                    console.log("BODY:", options.body);

                    const res = await fetch(url, {
                        method: "POST",
                        mode: "cors",
                        headers: {
                            "Content-Type": "text/plain;charset=utf-8"
                        },
                        body: options.body
                    });

                    console.log("STATUS:", res.status);

                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status}`);
                    }

                    const text = await res.text();

                    console.log("SERVER RESPONSE:", text);

                    let json;

                    try {
                        json = JSON.parse(text);
                    } catch {
                        throw new Error(
                            "Response không phải JSON:\n" + text
                        );
                    }

                    if (json.success) {
                        return json;
                    }

                    throw new Error(
                        json.message || "Apps Script trả lỗi"
                    );

                } catch (err) {

                    console.error(err);

                    lastError =
                        err.stack ||
                        err.message ||
                        String(err);

                    log(
                        `⚠️ Retry ${i + 1}/${retry}
${lastError}`
                    );

                    await sleep(1000);
                }
            }

            throw new Error(lastError);
        }
        async function uploadGoogle(url, label) {

            lastUploadUrl = url;
            lastUploadLabel = label;

            stopped = false;
            paused = false;

            if (!filteredData.length) {
                alert("Không có dữ liệu");
                return;
            }

            upload1.disabled = true;
            upload2.disabled = true;
            uploadAll.disabled = true;

            const retry =
                parseInt(
                    document
                        .getElementById(
                            "retryCount"
                        )
                        .value
                ) || 3;

            const chunkSize =
                parseInt(
                    document
                        .getElementById(
                            "chunkSize"
                        )
                        .value
                ) || 50000;

            const total =
                filteredData.length;

            let currentRow = 2;
            let uploaded = 0;
            let first = true;

            const started = performance.now();

            const totalChunks =
                Math.ceil(total / chunkSize);

            log("━━━━━━━━━━━━━━━━━━━━━━");
            log(`🚀 Uploading → ${label}`);


            for (
                let i = 0;
                i < total;
                i += chunkSize
            ) {

                if (stopped) {
                    log("⛔ Upload đã dừng");
                    break;
                }

                while (paused) {
                    await sleep(500);
                }

                const chunk =
                    filteredData.slice(
                        i,
                        i + chunkSize
                    );

                const pct =
                    (
                        uploaded /
                        total
                    ) * 100;

                updateProgress(pct);

                await retryFetch(
                    url,
                    {
                        body: JSON.stringify({
                            data: chunk,
                            offset: currentRow - 2,
                            isFirst: first,
                            tabName: "ALLDATAXL"
                        })
                    },
                    retry
                );

                uploaded +=
                    chunk.length;

                currentRow +=
                    chunk.length;

                first = false;

                const speed =
                    Math.round(
                        uploaded /
                        (
                            (
                                performance.now()
                                - started
                            ) / 1000
                        )
                    );

                const remain =
                    Math.round(
                        (
                            total -
                            uploaded
                        ) /
                        (
                            speed || 1
                        )
                    );

                const currentChunk =
                    Math.floor(i / chunkSize) + 1;

                log(
                    `[${currentChunk}/${totalChunks}] `
                    + `${uploaded.toLocaleString("vi-VN")}/${total.toLocaleString("vi-VN")} `
                    + `(${Math.round(uploaded / total * 100)}%) `
                    + `• ⚡ ${speed.toLocaleString("vi-VN")}/s `
                    + `• ETA ${remain}s`
                );


                updateProgress(
                    (
                        uploaded /
                        total
                    ) * 100
                );

                await sleep(50);
            }

            updateProgress(100);

            log("━━━━━━━━━━━━━━━━━━━━━━");
            log(`✅ ${label} completed`);


            upload1.disabled = false;
            uploadAll.disabled = false;

            if (
                document
                    .getElementById(
                        "sheet2"
                    )
                    .value
                    .trim()
            ) {
                upload2.disabled = false;
            }
        }

        upload1
            .addEventListener(
                "click",
                () => {

                    const url =
                        document
                            .getElementById(
                                "sheet1"
                            )
                            .value
                            .trim();

                    if (!url) {
                        alert(
                            "Thiếu URL"
                        );
                        return;
                    }

                    uploadGoogle(
                        url,
                        "Google Sheet 1"
                    );
                });

        upload2
            .addEventListener(
                "click",
                () => {

                    const url =
                        document
                            .getElementById(
                                "sheet2"
                            )
                            .value
                            .trim();

                    if (!url) {
                        alert(
                            "Thiếu URL"
                        );
                        return;
                    }

                    uploadGoogle(
                        url,
                        "Google Sheet 2"
                    );
                });
        uploadAll.addEventListener(
            "click",
            async () => {

                const urlMN =
                    document
                        .getElementById("sheet1")
                        .value
                        .trim();

                const urlMB =
                    document
                        .getElementById("sheet2")
                        .value
                        .trim();

                if (!urlMN || !urlMB) {
                    alert("Thiếu URL MN hoặc MB");
                    return;
                }

                try {

                    stopped = false;
                    paused = false;

                    log("🚀 Bắt đầu Upload ALL");

                    // Upload MN
                    log("📤 Upload ALLDATAXL MN...");
                    await uploadGoogle(
                        urlMN,
                        "ALLDATAXL MN"
                    );

                    if (stopped) return;

                    log("✅ MN hoàn tất");

                    await sleep(1000);

                    // Upload MB
                    log("📤 Upload ALLDATAXL MB...");
                    await uploadGoogle(
                        urlMB,
                        "ALLDATAXL MB"
                    );

                    if (stopped) return;

                    log(
                        "🎉 Upload ALL hoàn tất"
                    );

                } catch (err) {

                    console.error(err);

                    log(
                        "❌ Upload ALL lỗi: "
                        + err.message
                    );
                }
            }
        );
    </script>
