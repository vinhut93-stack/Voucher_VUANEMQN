<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BDI01 - Quản Lý Phân Quyền V2</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: #0f172a;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */

        .sidebar {
            width: 270px;
            background: #0f172a;
            color: white;
            padding: 24px;
            overflow-y: auto;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar h2 {
            margin-top: 0;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .sidebar p {
            color: #94a3b8;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #cbd5e1;
            margin-bottom: 20px;
            font-size: 14px;
            transition: 0.2s;
        }

        .back-btn:hover {
            color: white;
        }

        .module-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .module-btn {
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            padding: 14px 16px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-align: left;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .module-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .module-btn.active {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }

        .module-btn span {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* MAIN */

        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .topbar {
            display: flex;
            gap: 16px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .topbar-left h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
        }

        .topbar-left p {
            margin: 6px 0 0;
            color: #64748b;
            font-size: 14px;
        }

        .search-box {
            position: relative;
            width: 320px;
            max-width: 100%;
        }

        .search-box i {
            position: absolute;
            top: 50%;
            left: 14px;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .search-box input {
            width: 100%;
            padding: 14px 14px 14px 42px;
            border-radius: 14px;
            border: 1px solid #cbd5e1;
            background: white;
            outline: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .search-box input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* USER GRID */

        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 18px;
        }

        .user-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .user-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(15, 23, 42, 0.08);
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 18px;
        }

        .user-info h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
        }

        .user-info p {
            margin: 6px 0 0;
            font-size: 13px;
            color: #64748b;
            word-break: break-word;
        }

        .role-select {
            border: none;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            outline: none;
        }

        .role-admin {
            background: #fee2e2;
            color: #dc2626;
        }

        .role-user {
            background: #e2e8f0;
            color: #334155;
        }

        .permission-box {
            background: #f8fafc;
            border-radius: 14px;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .permission-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .permission-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: #dbeafe;
            color: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .permission-text h4 {
            margin: 0;
            font-size: 14px;
            font-weight: 700;
        }

        .permission-text p {
            margin: 4px 0 0;
            font-size: 12px;
            color: #64748b;
        }

        /* SWITCH */

        .switch {
            position: relative;
            width: 52px;
            height: 28px;
        }

        .switch input {
            display: none;
        }

        .slider {
            position: absolute;
            inset: 0;
            background: #cbd5e1;
            border-radius: 999px;
            transition: 0.25s;
            cursor: pointer;
        }

        .slider::before {
            content: "";
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: 0.25s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .switch input:checked + .slider {
            background: #2563eb;
        }

        .switch input:checked + .slider::before {
            transform: translateX(24px);
        }

        .loading {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            color: #64748b;
            font-weight: 600;
        }

        .empty {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            color: #64748b;
        }

        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .main {
                padding: 20px;
            }

            .user-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <h2>
                <i class="fa-solid fa-user-shield"></i>
                Phân Quyền
            </h2>

            <p>
                Hệ thống quản lý quyền truy cập module realtime.
            </p>

            <a href="index.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
                Quay lại Trang chủ
            </a>

            <div class="module-list" id="moduleList"></div>

        </aside>

        <!-- MAIN -->

        <main class="main">

            <div class="topbar">

                <div class="topbar-left">
                    <h1 id="currentModuleTitle">BÁO GIÁ</h1>
                    <p>Quản lý user có quyền truy cập module này</p>
                </div>

                <div class="search-box">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Tìm tên hoặc email user...">
                </div>

            </div>

            <div id="loading" class="loading">
                <i class="fa-solid fa-spinner fa-spin"></i>
                Đang tải dữ liệu hệ thống...
            </div>

            <div class="user-grid" id="userGrid"></div>

        </main>

    </div>

    <!-- FIREBASE -->

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>

        const modules = [
            { id: "baogia", name: "Báo giá", icon: "fa-file-invoice" },
            { id: "baocao", name: "Báo cáo", icon: "fa-chart-line" },
            { id: "baogiadoanhnghiep", name: "Báo giá DN", icon: "fa-building" },
            { id: "hanghoa", name: "Hàng hóa", icon: "fa-box" },
            { id: "tag_nem", name: "Tag đệm", icon: "fa-tag" },
            { id: "khongnguthu", name: "Không ngủ thử", icon: "fa-bed" },
            { id: "tag_cgpk", name: "Tag CGPK", icon: "fa-tags" },
            { id: "voucher", name: "Voucher", icon: "fa-ticket" },
            { id: "kichban", name: "Kịch bản", icon: "fa-scroll" },
            { id: "binhchuachay", name: "PCCC", icon: "fa-fire-extinguisher" },
            { id: "inbanten", name: "In bản tên", icon: "fa-id-card" },
            { id: "chungtu", name: "Chứng từ", icon: "fa-file-lines" },
            { id: "bbkiemke", name: "Kiểm kê", icon: "fa-clipboard-check" },
            { id: "chiphithuexe", name: "Chi phí thuê xe", icon: "fa-truck" }
        ];

        let allUsers = [];
        let currentModule = "baogia";

        // AUTH

        firebase.auth().onAuthStateChanged(function (user) {

            if (!user) {
                alert("Vui lòng đăng nhập!");
                window.location.href = "index.html";
                return;
            }

            firebase.firestore()
                .collection("users")
                .doc(user.email.toLowerCase())
                .get()
                .then(function (docSnap) {

                    if (docSnap.exists && docSnap.data().role === "admin") {

                        initModules();
                        loadAllUsers();

                    } else {

                        alert("Bạn không có quyền Admin!");
                        window.location.href = "index.html";

                    }

                });

        });

        // MODULE SIDEBAR

        function initModules() {

            const moduleList = document.getElementById("moduleList");

            moduleList.innerHTML = "";

            modules.forEach(module => {

                const btn = document.createElement("button");

                btn.className = "module-btn";

                if (module.id === currentModule) {
                    btn.classList.add("active");
                }

                btn.innerHTML = `
                    <span>
                        <i class="fa-solid ${module.icon}"></i>
                        ${module.name}
                    </span>

                    <i class="fa-solid fa-chevron-right"></i>
                `;

                btn.onclick = function () {

                    currentModule = module.id;

                    document.querySelectorAll(".module-btn")
                        .forEach(x => x.classList.remove("active"));

                    btn.classList.add("active");

                    document.getElementById("currentModuleTitle").innerText =
                        module.name.toUpperCase();

                    renderUsers();

                };

                moduleList.appendChild(btn);

            });

        }

        // LOAD USERS

        function loadAllUsers() {

            firebase.firestore()
                .collection("users")
                .onSnapshot(function (querySnapshot) {

                    allUsers = [];

                    querySnapshot.forEach(function (doc) {

                        allUsers.push({
                            email: doc.id.toLowerCase(),
                            ...doc.data()
                        });

                    });

                    document.getElementById("loading").style.display = "none";

                    renderUsers();

                });

        }

        // RENDER USERS

        function renderUsers() {

            const grid = document.getElementById("userGrid");

            const keyword =
                document.getElementById("searchInput").value.toLowerCase();

            const currentModuleInfo =
                modules.find(m => m.id === currentModule);

            const filtered = allUsers.filter(user => {

                const name =
                    (user.name || "").toLowerCase();

                const email =
                    (user.email || "").toLowerCase();

                return (
                    name.includes(keyword) ||
                    email.includes(keyword)
                );

            });

            if (filtered.length === 0) {

                grid.innerHTML = `
                    <div class="empty">
                        <i class="fa-solid fa-users-slash"></i>
                        <h3>Không tìm thấy user</h3>
                    </div>
                `;

                return;

            }

            grid.innerHTML = filtered.map(user => {

                const permissions = user.permissions || {};

                const isAdmin = user.role === "admin";

                return `

                    <div class="user-card">

                        <div class="user-header">

                            <div class="user-info">
                                <h3>
                                    <i class="fa-solid fa-user"></i>
                                    ${user.name || 'Chưa đặt tên'}
                                </h3>

                                <p>${user.email}</p>
                            </div>

                            <select
                                class="role-select ${isAdmin ? 'role-admin' : 'role-user'}"
                                onchange="changeUserRole('${user.email}', this)"
                            >
                                <option value="user" ${!isAdmin ? 'selected' : ''}>
                                    User
                                </option>

                                <option value="admin" ${isAdmin ? 'selected' : ''}>
                                    Admin
                                </option>
                            </select>

                        </div>

                        <div class="permission-box">

                            <div class="permission-left">

                                <div class="permission-icon">
                                    <i class="fa-solid ${currentModuleInfo.icon}"></i>
                                </div>

                                <div class="permission-text">
                                    <h4>${currentModuleInfo.name}</h4>

                                    <p>
                                        ${isAdmin
                                            ? 'Admin luôn có toàn quyền'
                                            : 'Bật / tắt quyền truy cập'}
                                    </p>
                                </div>

                            </div>

                            <label class="switch">

                                <input
                                    type="checkbox"
                                    ${(isAdmin || permissions[currentModule]) ? "checked" : ""}
                                    ${isAdmin ? "disabled" : ""}
                                    onchange="togglePermission('${user.email}', '${currentModule}', this.checked)"
                                >

                                <span class="slider"></span>

                            </label>

                        </div>

                    </div>

                `;

            }).join("");

        }

        // SEARCH

        document.getElementById("searchInput")
            .addEventListener("input", renderUsers);

        // TOGGLE PERMISSION

        function togglePermission(targetEmail, functionName, isChecked) {

            var updateData = {};

            updateData["permissions." + functionName] = isChecked;

            firebase.firestore()
                .collection("users")
                .doc(targetEmail.toLowerCase())
                .update(updateData)
                .then(function () {

                    console.log(
                        "Đã cập nhật quyền:",
                        functionName,
                        isChecked
                    );

                })
                .catch(function (error) {

                    alert("Lỗi cập nhật quyền: " + error.message);

                });

        }

        // CHANGE ROLE

        function changeUserRole(targetEmail, selectElement) {

            var newRole = selectElement.value;

            let updateData = {
                role: newRole
            };

            if (newRole === "admin") {

                modules.forEach(module => {
                    updateData["permissions." + module.id] = true;
                });

            }

            firebase.firestore()
                .collection("users")
                .doc(targetEmail.toLowerCase())
                .update(updateData)
                .then(function () {

                    if (newRole === "user") {

                        let resetPermissions = {};

                        modules.forEach(module => {
                            resetPermissions["permissions." + module.id] = false;
                        });

                        firebase.firestore()
                            .collection("users")
                            .doc(targetEmail.toLowerCase())
                            .update(resetPermissions);

                    }

                })
                .catch(function (error) {

                    alert("Lỗi cập nhật role: " + error.message);

                });

        }

    </script>

</body>

</html>
