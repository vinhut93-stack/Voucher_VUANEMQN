    <script>

        firebase.auth().onAuthStateChanged(function (user) {

            if (!user) {

                alert("Vui lòng đăng nhập!");
                window.location.href = "index.html";
                return;
            }

            firebase.firestore()
                .collection("users")
                .doc(user.email.toLowerCase())
                .get()
                .then(function (doc) {

                    if (!doc.exists) {

                        alert("Không tìm thấy dữ liệu user!");
                        window.location.href = "index.html";
                        return;
                    }

                    const userData = doc.data();

                    // ADMIN được vào toàn bộ
                    if (userData.role === "admin") {
                        return;
                    }

                    // CHECK QUYỀN MODULE
                    const permissions = userData.permissions || {};

                    if (!permissions.temkien) {

                        alert("Bạn không có quyền truy cập module này!");

                        window.location.href = "index.html";
                    }

                });

        });

    </script>

<body>

    <div class="control-panel">

        <div class="panel-header">

            <div class="panel-title">
                <h2>WMS SHIPPING LABEL SYSTEM V4</h2>
                <span>8 tem kiện trên 1 tờ A4 dọc</span>
            </div>

            <button class="btn btn-add" onclick="addNewRow()">
                + THÊM TO
            </button>

        </div>

        <table>

            <thead>
                <tr>
                    <th style="width:30%">MÃ TO</th>
                    <th style="width:10%">SỐ KIỆN</th>
                    <th style="width:24%">KHO XUẤT</th>
                    <th style="width:24%">KHO NHẬN</th>
                    <th style="width:12%">THAO TÁC</th>
                </tr>
            </thead>

            <tbody id="inputRowContainer">

                <tr>
                    <td>
                        <input type="text"
class="in-to"
placeholder="Điền mã TO vào đây">
                    </td>

                    <td>
                        <input type="number" class="in-qty" value="1" min="1">
                    </td>

                    <td>
                        <input type="text" class="in-from" value="BDI01 - KC">
                    </td>

                    <td>
                        <input type="text" class="in-towh" value="HMIKT - KC">
                    </td>

                    <td>
                        <button class="btn btn-delete" onclick="deleteRow(this)">
                            XÓA
                        </button>
                    </td>
                </tr>

            </tbody>

        </table>

        <div class="actions">

            <button class="btn btn-clear" onclick="clearPreview()">
                XÓA BẢN XEM
            </button>

            <button class="btn btn-generate" onclick="renderLabels()">
                XEM TRƯỚC KHI IN
            </button>

            <button
    class="btn btn-print"
    id="printBtn"
    onclick="window.print()"
    style="display:none;">
    IN TEM
</button>

        </div>

    </div>

    <div class="print-area">
        <div id="labelsContainer"></div>
    </div>

    <script>

        function addNewRow() {

            const tbody = document.getElementById('inputRowContainer');

            const tr = document.createElement('tr');

            tr.innerHTML = `
                <td>
                    <input type="text" class="in-to" placeholder="Nhập mã TO...">
                </td>

                <td>
                    <input type="number" class="in-qty" value="1" min="1">
                </td>

                <td>
                    <input type="text" class="in-from" placeholder="Kho xuất...">
                </td>

                <td>
                    <input type="text" class="in-towh" placeholder="Kho nhận...">
                </td>

                <td>
                    <button class="btn btn-delete" onclick="deleteRow(this)">
                        XÓA
                    </button>
                </td>
            `;

            tbody.appendChild(tr);
        }

        function deleteRow(btn) {

            const tbody = document.getElementById('inputRowContainer');

            if (tbody.rows.length <= 1) {
                alert('Phải còn ít nhất 1 dòng.');
                return;
            }

            btn.closest('tr').remove();
        }

        function clearPreview() {
            document.getElementById('labelsContainer').innerHTML = '';
        }

        function renderLabels() {

            const container = document.getElementById('labelsContainer');

            container.innerHTML = '';

            const rows = document.querySelectorAll('#inputRowContainer tr');

            let valid = false;

            rows.forEach((row, rowIndex) => {

                const to = row.querySelector('.in-to').value.trim();
                const qty = parseInt(row.querySelector('.in-qty').value);
                const from = row.querySelector('.in-from').value.trim();
                const towh = row.querySelector('.in-towh').value.trim();

                if (to && qty > 0 && from && towh) {

                    valid = true;

                    for (let i = 1; i <= qty; i++) {

                        const uniqueId = `barcode_${rowIndex}_${i}`;
                        const qrId = `qr_${rowIndex}_${i}`;

                        const now = new Date();

                        const dateText =
                            now.toLocaleDateString('vi-VN') + ' ' +
                            now.toLocaleTimeString('vi-VN');

                        const html = `
                            <div class="label">

                                <div class="label-left">

                                    <div>

                                        <div class="header-top">

                                            <div class="warehouse-badge">
                                                TRANSFER ORDER
                                            </div>

                                            <div class="date-time">
                                                ${dateText}
                                            </div>

                                        </div>
                                        <div class="to-code">
                                            ${to}
                                        </div>

                                        <div class="route-box">

                                            <div class="route">

                                                <div class="route-wh">
                                                    <span>KHO XUẤT</span>
                                                    <strong>${from}</strong>
                                                </div>

                                                <div class="arrow">
    <i class="fa-solid fa-truck-fast"></i>
</div>

                                                <div class="route-wh">
                                                    <span>KHO NHẬN</span>
                                                    <strong>${towh}</strong>
                                                </div>

                                            </div>

                                        </div>

                                        <div class="barcode-wrap">

                                            <svg id="${uniqueId}"></svg>

                                            <div class="barcode-text">
                                                ${to}
                                            </div>

                                        </div>

                                    </div>

                                </div>

                                <!-- RIGHT -->

<div class="label-right">

    <div class="right-top">

        <!-- TEXT -->

        <div class="right-info">

            <div class="package-title">
                PACKAGE
            </div>

            <div class="package-counter">

    <div class="package-no">
        ${i}
    </div>

    <div class="package-divider">/</div>

    <div class="package-total">
        ${qty}
    </div>

</div>

        </div>

        <!-- QR -->

        <div class="qr-mini">
            <div id="${qrId}"></div>
        </div>

    </div>

    <!-- NGÀY CHUYỂN -->

    <div class="ship-box">

        <div class="ship-title">
            NGÀY CHUYỂN THỰC TẾ
        </div>

        <div class="ship-line"></div>

    </div>

</div>
                        `;

                        container.insertAdjacentHTML('beforeend', html);

                        JsBarcode(`#${uniqueId}`, to, {
    format: "CODE128",
    width: 1,
    height: 14,
    displayValue: false,
    margin: 0
});

                        new QRCode(document.getElementById(qrId), {
    text: `${to}|${i}/${qty}|${from}|${towh}`,
    width: 65,
    height: 65
});

                    }

                }

            });

            if (!valid) {

    alert('Vui lòng nhập đầy đủ thông tin.');

    document.getElementById('printBtn').style.display = 'none';

} else {

    document.getElementById('printBtn').style.display = 'inline-block';

}

} // <-- đóng function renderLabels ở đây



/* =========================
   ẨN NÚT IN KHI SỬA DỮ LIỆU
========================= */

function hidePrintButton() {

    document.getElementById('printBtn').style.display = 'none';

}

document.addEventListener('input', function(e) {

    if (
        e.target.classList.contains('in-to') ||
        e.target.classList.contains('in-qty') ||
        e.target.classList.contains('in-from') ||
        e.target.classList.contains('in-towh')
    ) {

        hidePrintButton();

    }

});


/* =========================
   LOAD
========================= */

window.onload = () => {

    hidePrintButton();

};
 </script>

                <path d="M18 15l-6-6-6 6" />

            </svg>
        </button>

        <!-- HOME -->
        <button class="action-fab btn-home" onclick="location.href='index.html'" title="Trang chủ">

            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">

                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>

                <polyline points="9 22 9 12 15 12 15 22"></polyline>

            </svg>

        <!-- LOGOUT -->
        <button class="action-fab" onclick="logoutSystem()" title="Đăng xuất" style="background:#b71c1c;">

            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">

                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>

                <polyline points="16 17 21 12 16 7"></polyline>

                <line x1="21" y1="12" x2="9" y2="12"></line>

            </svg>
        </button>

    </div>

    <script>
        function logoutSystem() {

            firebase.auth().signOut()
                .then(() => {

                    window.location.href = "index.html";

                })
                .catch((error) => {

                    alert("Lỗi đăng xuất: " + error.message);

                });
        }
    </script>
