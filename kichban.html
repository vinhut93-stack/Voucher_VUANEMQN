<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vua Nệm - Chăm sóc khách hàng</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-primary: #003580;
            --brand-accent: #27ae60;
            --brand-secondary: #0068ff;
            --bg-body: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #334155;
            --radius-lg: 24px;
            --radius-md: 12px;
        }
@keyframes loadingBar {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* Overlay bảo mật chuyên nghiệp hơn */
        #secure-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: var(--card-bg);
            padding: 35px;
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { 
            color: var(--brand-primary); 
            font-size: 1.6rem; 
            font-weight: 800; 
            margin: 0; 
            letter-spacing: -0.5px;
        }

        /* Input Wrappers hiện đại */
        .input-group { margin-bottom: 18px; }
        label { 
            font-weight: 700; 
            display: block; 
            margin-bottom: 6px; 
            color: var(--brand-primary); 
            font-size: 0.75rem; 
            text-transform: uppercase;
            padding-left: 4px;
        }

        input, select {
            width: 100%; 
            padding: 14px 16px; 
            border-radius: var(--radius-md); 
            border: 2px solid #e2e8f0;
            background: #fff; 
            font-size: 0.95rem; 
            transition: all 0.3s; 
            box-sizing: border-box;
            color: var(--text-main);
        }

        input:focus, select:focus {
            border-color: var(--brand-accent); 
            outline: none;
            box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.1);
        }

        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn-main {
            background: linear-gradient(135deg, #003580 0%, #0056b3 100%);
	    box-shadow: 0 4px 15px rgba(0, 53, 128, 0.3); 
            color: white; 
            padding: 18px; 
            border: none;
            border-radius: var(--radius-md); 
            font-weight: 700; 
            font-size: 1rem; 
            cursor: pointer;
            width: 100%; 
            margin-top: 10px; 
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-main:hover { background: #000; transform: translateY(-3px); }

        /* Kết quả kịch bản */
        .script-card {
            background: #fff; 
            border: 1px solid #edf2f7; 
            border-radius: 18px;
            padding: 20px; 
            margin-top: 20px; 
            animation: slideIn 0.4s ease-out;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .script-content { 
            font-size: 1.1rem; 
            color: #0f172a; 
            line-height: 1.6; 
            margin-bottom: 18px; 
            white-space: pre-wrap;
            background: #fdfdfd;
            padding: 15px;
            border-radius: 12px;
	    border-left: 5px solid var(--brand-accent);
        }

        .card-actions { display: flex; gap: 10px; }
        .btn-action { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 10px; 
            font-weight: 600; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            transition: 0.2s;
        }
        .btn-copy { background: #f1f5f9; color: #475569; }
        .btn-zalo { background: var(--brand-secondary); color: white; }
        .btn-action:active { transform: scale(0.95); }

        /* Floating Controls */
        .floating-controls { 
            position: fixed; bottom: 24px; right: 24px; 
            display: flex; flex-direction: column; gap: 12px; z-index: 999;
        }

        .fab-btn { 
            width: 50px; height: 50px; border-radius: 16px; border: none; 
            background: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            transition: 0.3s;
        }
        .fab-btn:hover { transform: translateY(-3px); }

        #status-msg { font-size: 0.75rem; color: #64748b; margin-top: 12px; text-align: center; }
    </style>

    <!-- GIỮ NGUYÊN THƯ VIỆN FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
	<script src="firebase-config.js"></script>
</head>
<body>

<div id="secure-overlay">
    <!-- Icon cánh tay cơ bắp với hiệu ứng nhịp đập -->
    <i class="fa-solid fa-rocket fa-beat" style="color: #f1c40f; font-size: 4rem;"></i>
    
    <p style="margin-top: 20px; font-weight: 800; color: #1e293b; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px;">
        Đang kích hoạt chế độ bán hàng đỉnh cao <span style="display: inline-block;" class="fa-bounce">💪</span>
    </p>
    
    <!-- Thanh load chạy cho chuyên nghiệp -->
    <div style="width: 200px; height: 6px; background: #e2e8f0; border-radius: 10px; margin-top: 15px; overflow: hidden;">
        <div style="width: 50%; height: 100%; background: var(--brand-accent); border-radius: 10px; animation: loadingBar 2s infinite ease-in-out;"></div>
    </div>
</div>
<div class="container">
    <div class="header">
    <div style="margin-bottom: 25px; text-align: center;">
        <img src="logo_vuanem.png" 
             alt="Vua Nệm Logo" 
             style="height: 140px; width: auto; object-fit: contain; background: transparent;">
    </div>
    
    <h2 style="color: var(--brand-primary); letter-spacing: 1px;">KỊCH BẢN XỬ LÝ TỪ CHỐI</h2>
    <p style="color: #64748b; font-size: 0.85rem; margin-top: 8px; font-weight: 500;">
        Hệ thống sử dụng nội bộ tại Vua Nệm Quy Nhơn
    </p>
</div>

    <div class="input-group">
        <label>Tên khách hàng</label>
        <input id="name" placeholder="Ví dụ: Anh Nhựt, Chị Quyên...">
    </div>

    <div class="input-group">
        <label>Voucher / Quà tặng</label>
        <input id="voucher" placeholder="Ví dụ: GIAM500K, Gối cao su...">
    </div>

    <div class="grid-row">
        <div class="input-group">
            <label>Trạng thái</label>
            <select id="status"><option value="Tất cả">Tất cả</option></select>
        </div>
        <div class="input-group">
            <label>Mục tiêu</label>
            <select id="goal"><option value="Tất cả">Tất cả</option></select>
        </div>
    </div>

    <div class="input-group">
        <label>Thời điểm</label>
        <select id="time"><option value="Tất cả">Tất cả</option></select>
    </div>

    <button class="btn-main" onclick="generate()">
        <span>TẠO KỊCH BẢN NGAY</span>
        <i class="fa-solid fa-paper-plane"></i>
    </button>
    
    <div id="status-msg">
        <i class="fa-solid fa-circle-notch fa-spin"></i> Đang đồng bộ dữ liệu...
    </div>
    
    <div id="scripts-container"></div>
</div>

<!-- GIỮ NGUYÊN LOGIC FIREBASE & XỬ LÝ -->
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxiyZxaApzeJ5GNBtiDwgbln_BZonALfICWaMqVVfE-SAgO87knZ4cedZRvHTska-jk/exec";
    let scriptsData = [];

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            try {
                const userDoc = await db.collection("users").doc(user.email.toLowerCase()).get();
                if (!userDoc.exists) {
                    alert("Tài khoản không đủ quyền!");
                    auth.signOut().then(() => window.location.href = "index.html");
                    return;
                }
                document.getElementById("secure-overlay").style.display = "none";
                loadScripts();
            } catch (e) { window.location.href = "index.html"; }
        } else { window.location.href = "index.html"; }
    });

    function loadScripts() {
        let cache = localStorage.getItem("scriptsData");
        if (cache) { 
            const parsed = JSON.parse(cache);
            scriptsData = parsed.scripts;
            if (parsed.config) {
                updateDropdown("status", parsed.config.status);
                updateDropdown("goal", parsed.config.goal);
                updateDropdown("time", parsed.config.time);
            }
            document.getElementById("status-msg").innerHTML = "<i class='fa-solid fa-check'></i> Hệ thống sẵn sàng!"; 
        }
        const script = document.createElement("script");
        script.src = `${SCRIPT_URL}?callback=handleData`;
        document.body.appendChild(script);
    }

    function handleData(data) {
        scriptsData = data.scripts;
        localStorage.setItem("scriptsData", JSON.stringify(data));
        updateDropdown("status", data.config.status);
        updateDropdown("goal", data.config.goal);
        updateDropdown("time", data.config.time);
        document.getElementById("status-msg").innerHTML = "<i class='fa-solid fa-circle-check' style='color:var(--brand-accent)'></i> Đã cập nhật dữ liệu mới!";
    }

    function updateDropdown(elementId, options) {
        const select = document.getElementById(elementId);
        if (!select || !options) return;
        select.innerHTML = '<option value="Tất cả">Tất cả</option>';
        options.forEach(opt => {
            const el = document.createElement("option");
            el.value = opt; el.textContent = opt;
            select.appendChild(el);
        });
    }

    function generate() {
        if (!scriptsData.length) { alert("Dữ liệu đang tải..."); return; }
        const name = document.getElementById("name").value || "Anh/Chị";
        const voucher = document.getElementById("voucher").value || "ƯU ĐÃI ĐẶC BIỆT";
        const status = document.getElementById("status").value;
        const goal = document.getElementById("goal").value;
        const time = document.getElementById("time").value;
        const today = new Date().toLocaleDateString("vi-VN");

        let matched = scriptsData.filter(s => 
            (s.status === status || s.status === "Tất cả") &&
            (s.goal === goal || s.goal === "Tất cả") &&
            (s.time === time || s.time === "Tất cả")
        );

        if (!matched.length) {
            matched = scriptsData.filter(s => 
                (s.status === status || s.status === "Tất cả") &&
                (s.goal === goal || s.goal === "Tất cả")
            );
        }

        if (!matched.length) {
            document.getElementById("scripts-container").innerHTML = "<p style='text-align:center; color:#ef4444; margin-top:20px;'>Không tìm thấy kịch bản phù hợp.</p>";
            return;
        }

        let html = "";
        matched.sort(() => 0.5 - Math.random()).slice(0, 3).forEach((s, index) => {
            let msg = s.content.replace(/{ten_khach}/g, name).replace(/{voucher}/g, voucher).replace(/{ngay}/g, today);
            html += `
                <div class="script-card">
                    <div class="script-content" id="msg-${index}">${msg}</div>
                    <div class="card-actions">
                        <button class="btn-action btn-copy" onclick="copyText(${index})"><i class="fa-regular fa-copy"></i> Chép</button>
                        
                    </div>
                </div>`;
        });
        document.getElementById("scripts-container").innerHTML = html;
    }

    function copyText(id) {
        const text = document.getElementById(`msg-${id}`).innerText;
        navigator.clipboard.writeText(text).then(() => alert("Đã chép kịch bản!"));
    }

    function sendZalo(id) {
        const text = document.getElementById(`msg-${id}`).innerText;
        window.open(`https://zalo.me/?text=${encodeURIComponent(text)}`, "_blank");
    }

    function refreshData() {
        localStorage.removeItem("scriptsData");
        location.reload();
    }

    function logoutSystem() {
        auth.signOut().then(() => {
            localStorage.clear();
            window.location.href = "index.html";
        });
    }
</script>

<!-- Nút điều hướng nổi -->
<div class="floating-controls">
	<button class="fab-btn" onclick="window.location.href='index.html'" title="Về trang chủ" style="background: var(--brand-primary); color: white;">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="fab-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" title="Lên đầu">
        <i class="fa-solid fa-chevron-up"></i>
    </button>
    <button class="fab-btn" onclick="refreshData()" title="Làm mới">
        <i class="fa-solid fa-arrows-rotate"></i>
    </button>
    <button class="fab-btn" onclick="logoutSystem()" style="background: #fee2e2; color: #ef4444;" title="Đăng xuất">
        <i class="fa-solid fa-power-off"></i>
    </button>
</div>
</body>
</html>
