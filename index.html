<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Vua Nệm Quy Nhơn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --vuanem-blue: #002c77;
            --vuanem-orange: #f6891f;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            color: var(--vuanem-blue);
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .header p {
            color: #64748b;
            margin-bottom: 40px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 20px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 44, 119, 0.05);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--vuanem-orange);
            box-shadow: 0 15px 30px rgba(0, 44, 119, 0.15);
        }

        .icon-box {
            width: 70px;
            height: 70px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            font-size: 30px;
            color: white;
        }

        .bg-blue { background: var(--vuanem-blue); }
        .bg-orange { background: var(--vuanem-orange); }

        .card h2 {
            margin: 0 0 10px;
            color: #1e293b;
            font-size: 20px;
            font-weight: 700;
        }

        .card p {
            color: #64748b;
            font-size: 14px;
            margin: 0;
        }

        .footer {
            margin-top: 50px;
            font-size: 13px;
            color: #94a3b8;
        }

        @media (max-width: 600px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>VUA NỆM QUY NHƠN</h1>
            <p>Hệ thống hỗ trợ bán hàng chuyên nghiệp</p>
        </div>

        <div class="dashboard-grid">
            <a href="baogia.html" class="card">
                <div class="icon-box bg-blue">
                    <i class="fa-solid fa-file-invoice-dollar"></i>
                </div>
                <h2>Lập Báo Giá Nhanh</h2>
                <p>Công cụ in báo giá chuyên nghiệp cho khách hàng tại Vua Nệm Quy Nhơn.</p>
            </a>

            <a href="voucher.html" class="card">
                <div class="icon-box bg-orange">
                    <i class="fa-solid fa-ticket"></i>
                </div>
                <h2>Voucher</h2>
                <p>Áp dụng các chương trình khuyến mãi và voucher mới nhất.</p>
            </a>
        </div>

        <div class="footer">
            PHÁT TRIỂN BỞI VI NHỰT (VN5022) • VUA NỆM 2026
        </div>
    </div>

</body>
</html>
