<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Vua Nệm Quy Nhơn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --vuanem-blue: #002c77;
            --vuanem-orange: #f6891f;
            --bg-light: #f4f7fa;
            --text-dark: #1a202c;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            color: var(--vuanem-blue);
            font-size: 28px;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 800;
        }

        .header p {
            color: #718096;
            font-style: italic;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 20px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
            border-color: var(--vuanem-orange);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            font-size: 32px;
            color: white;
        }

        .bg-blue { background-color: var(--vuanem-blue); }
        .bg-orange { background-color: var(--vuanem-orange); }

        .card h2 {
            margin: 10px 0;
            color: var(--text-dark);
            font-size: 20px;
            font-weight: 700;
        }

        .card p {
            color: #4a5568;
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #a0aec0;
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .header h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>VUA NỆM QUY NHƠN</h1>
            <p>Hệ thống công cụ hỗ trợ bán hàng nội bộ</p>
        </div>

        <div class="dashboard-grid">
            <a href="baogia.html" class="card">
                <div class="icon-circle bg-blue">
                    <i class="fa-solid fa-file-invoice-dollar"></i>
                </div>
                <h2>Lập Báo Giá Nhanh</h2>
                <p>Công cụ in báo giá chuyên nghiệp cho khách hàng lẻ tại Quy Nhơn.</p>
            </a>

            <a href="voucher.html" class="card">
                <div class="icon-circle bg-orange">
                    <i class="fa-solid fa-tags"></i>
                </div>
                <h2>Voucher</h2>
                <p>Áp dụng các chương trình khuyến mãi và voucher giảm giá mới nhất.</p>
            </a>
        </div>

        <div class="footer">
            Bản quyền thuộc về Vi Nhựt (VN5022) • 2026
        </div>
    </div>

</body>
</html>
